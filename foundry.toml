[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = '0.8.20'
optimizer = true
optimizer_runs = 200
verbosity = 2

remappings = [
    "sparklend-v1-core/=lib/sparklend-v1-core/",
    "ds-test/=lib/forge-std/lib/ds-test/src/",
    "erc20-helpers/=lib/erc20-helpers/src/",
    "forge-std/=lib/forge-std/src/",
    "sparklend-advanced/=lib/sparklend-advanced/src/",
    "sparklend-address-registry/=lib/sparklend-address-registry/src/"
]

[fuzz]
runs = 1000

# Modest defaults so `forge test` smoke-runs the stateful suite quickly. Raise runs/depth
# (e.g. FOUNDRY_INVARIANT_RUNS=256 FOUNDRY_INVARIANT_DEPTH=200) for a real campaign.
# fail_on_revert stays true: every handler action is try/catch-wrapped, so a revert reaching
# the runner means a handler bug (bad bound, broken setup), not an expected protocol revert.
[invariant]
runs = 48
depth = 100
fail_on_revert = true

# See more config options https://github.com/foundry-rs/foundry/tree/master/config
